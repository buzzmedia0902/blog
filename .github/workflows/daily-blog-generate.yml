name: Daily Blog Generation

on:
  schedule:
    # 毎日 9:00 UTC (18:00 JST) に実行
    - cron: "0 9 * * *"
  # 手動トリガーも可能
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate blog post
        run: npx tsx agents/index.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Check if new post was created
        id: check_files
        run: |
          if [[ -n $(git status -s content/posts/) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_files.outputs.has_changes == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git add content/posts/
          git commit -m "Auto-generated blog post [ci skip]"
          git push

      - name: Create deployment
        if: steps.check_files.outputs.has_changes == 'true'
        run: |
          echo "New blog post generated and deployed successfully!"
